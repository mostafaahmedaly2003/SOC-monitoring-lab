<ossec_config>

  <!-- ── Manager Connection ─────────────────────────────────── -->
  <client>
    <server>
      <address>192.168.1.33</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ── Buffer Settings ────────────────────────────────────── -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ── Snort Alert Log (primary source) ──────────────────── -->
  <!-- Wazuh built-in decoder: snort-fast                       -->
  <!-- Parses: rule_id, srcip, dstip, protocol, msg             -->
  <localfile>
    <log_format>snort-fast</log_format>
    <location>/var/log/snort/alert_fast.txt</location>
  </localfile>

  <!-- ── Kali System Logs ───────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- ── Docker Logs (optional — Shuffle container) ─────────── -->
  <!-- Uncomment to monitor Shuffle container logs:
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/lib/docker/containers/*/*-json.log</location>
  </localfile>
  -->

</ossec_config>
